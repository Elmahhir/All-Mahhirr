<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dompetku - Catatan Keuangan Pribadi</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans p-4 md:p-8">
  <div class="max-w-5xl mx-auto space-y-6">

    <!-- Header -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Dompetku</h1>
        <p class="text-slate-500 text-sm">Pencatat Keuangan Pribadi (100% Offline & Gratis)</p>
      </div>
      <button onclick="resetData()" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-lg font-medium transition">
        Reset Semua Data
      </button>
    </header>

    <!-- Ringkasan Statistik -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Total Pemasukan</p>
        <p id="totalIncome" class="text-xl font-bold text-emerald-600 mt-1">Rp 0</p>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Total Pengeluaran</p>
        <p id="totalExpense" class="text-xl font-bold text-rose-600 mt-1">Rp 0</p>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Sisa Saldo</p>
        <p id="netBalance" class="text-xl font-bold text-slate-900 mt-1">Rp 0</p>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Rata-rata Pengeluaran</p>
        <p id="avgExpense" class="text-xl font-bold text-indigo-600 mt-1">Rp 0 <span class="text-xs font-normal text-slate-400">/txn</span></p>
      </div>
    </div>

    <!-- Form + Grafik Section -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Form Tambah Transaksi -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1">
        <h2 class="text-lg font-bold mb-4 text-slate-900">Tambah Transaksi</h2>
        <form id="txForm" onsubmit="addTransaction(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Tipe Transaksi</label>
            <select id="type" class="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
              <option value="Pengeluaran">Pengeluaran</option>
              <option value="Pemasukan">Pemasukan</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Nominal (Rp)</label>
            <input type="number" id="amount" required placeholder="Contoh: 25000" class="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Kategori</label>
            <select id="category" class="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
              <option value="Makanan">Makanan & Minuman</option>
              <option value="Transportasi">Transportasi</option>
              <option value="Belanja">Belanja</option>
              <option value="Hiburan">Hiburan</option>
              <option value="Edukasi">Edukasi / Sekolah</option>
              <option value="Gaji/Saku">Gaji / Uang Saku</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Tanggal</label>
            <input type="date" id="date" required class="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Catatan (Opsional)</label>
            <input type="text" id="note" placeholder="Contoh: Beli makan siang" class="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl text-sm transition">
            + Simpan Transaksi
          </button>
        </form>
      </div>

      <!-- Grafik Kategori Pengeluaran -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2 flex flex-col justify-between">
        <h2 class="text-lg font-bold mb-2 text-slate-900">Statistik Pengeluaran per Kategori</h2>
        <div class="relative w-full h-64 flex items-center justify-center">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Tabel Riwayat Transaksi -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-slate-900">Riwayat Transaksi</h2>
        <span id="txCount" class="text-xs text-slate-500 font-medium">0 transaksi</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-200 text-slate-400 text-xs uppercase tracking-wider">
              <th class="pb-3 px-2">Tanggal</th>
              <th class="pb-3 px-2">Kategori</th>
              <th class="pb-3 px-2">Catatan</th>
              <th class="pb-3 px-2">Tipe</th>
              <th class="pb-3 px-2 text-right">Nominal</th>
              <th class="pb-3 px-2 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="txTableBody" class="divide-y divide-slate-100 text-sm">
            <!-- Data dimasukkan via JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Ambil data awal dari localStorage
    let transactions = JSON.parse(localStorage.getItem('my_finance_data')) || [
      { id: 1, type: 'Pemasukan', amount: 300000, category: 'Gaji/Saku', date: '2026-07-20', note: 'Uang Saku' },
      { id: 2, type: 'Pengeluaran', amount: 25000, category: 'Makanan', date: '2026-07-21', note: 'Makan Siang' },
      { id: 3, type: 'Pengeluaran', amount: 15000, category: 'Transportasi', date: '2026-07-21', note: 'Bensin' }
    ];

    let chartInstance = null;

    document.getElementById('date').valueAsDate = new Date();

    function formatRupiah(num) {
      return 'Rp ' + num.toLocaleString('id-ID');
    }

    function addTransaction(e) {
      e.preventDefault();
      const type = document.getElementById('type').value;
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;
      const date = document.getElementById('date').value;
      const note = document.getElementById('note').value || '-';

      const newTx = {
        id: Date.now(),
        type,
        amount,
        category,
        date,
        note
      };

      transactions.unshift(newTx);
      saveData();
      document.getElementById('txForm').reset();
      document.getElementById('date').valueAsDate = new Date();
      renderApp();
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(tx => tx.id !== id);
      saveData();
      renderApp();
    }

    function resetData() {
      if (confirm('Apakah Anda yakin ingin menghapus semua data transaksi?')) {
        transactions = [];
        saveData();
        renderApp();
      }
    }

    function saveData() {
      localStorage.setItem('my_finance_data', JSON.stringify(transactions));
    }

    function renderApp() {
      let totalIncome = 0;
      let totalExpense = 0;
      let expenseCount = 0;
      const categoryTotals = {};

      transactions.forEach(tx => {
        if (tx.type === 'Pemasukan') {
          totalIncome += tx.amount;
        } else {
          totalExpense += tx.amount;
          expenseCount++;
          categoryTotals[tx.category] = (categoryTotals[tx.category] || 0) + tx.amount;
        }
      });

      const netBalance = totalIncome - totalExpense;
      const avgExpense = expenseCount > 0 ? totalExpense / expenseCount : 0;

      document.getElementById('totalIncome').innerText = formatRupiah(totalIncome);
      document.getElementById('totalExpense').innerText = formatRupiah(totalExpense);
      document.getElementById('netBalance').innerText = formatRupiah(netBalance);
      document.getElementById('avgExpense').innerText = formatRupiah(Math.round(avgExpense));
      document.getElementById('txCount').innerText = `${transactions.length} transaksi`;

      const tbody = document.getElementById('txTableBody');
      if (transactions.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-slate-400">Belum ada transaksi recorded.</td></tr>`;
      } else {
        tbody.innerHTML = transactions.map(tx => `
          <tr class="hover:bg-slate-50 transition">
            <td class="py-3 px-2 text-slate-500 text-xs">${tx.date}</td>
            <td class="py-3 px-2 font-medium">${tx.category}</td>
            <td class="py-3 px-2 text-slate-600">${tx.note}</td>
            <td class="py-3 px-2">
              <span class="px-2 py-1 text-xs rounded-full font-semibold ${tx.type === 'Pemasukan' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                ${tx.type}
              </span>
            </td>
            <td class="py-3 px-2 text-right font-bold ${tx.type === 'Pemasukan' ? 'text-emerald-600' : 'text-slate-800'}">
              ${tx.type === 'Pemasukan' ? '+' : '-'} ${formatRupiah(tx.amount)}
            </td>
            <td class="py-3 px-2 text-center">
              <button onclick="deleteTransaction(${tx.id})" class="text-rose-500 hover:text-rose-700 text-xs font-semibold">Hapus</button>
            </td>
          </tr>
        `).join('');
      }

      renderChart(categoryTotals);
    }

    function renderChart(categoryTotals) {
      const ctx = document.getElementById('categoryChart').getContext('2d');
      const labels = Object.keys(categoryTotals);
      const data = Object.values(categoryTotals);

      if (chartInstance) {
        chartInstance.destroy();
      }

      if (labels.length === 0) {
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        return;
      }

      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: [
              '#f87171', '#38bdf8', '#fbbf24', '#a78bfa', '#4ade80', '#f472b6', '#94a3b8'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { boxWidth: 12, font: { size: 11 } }
            }
          }
        }
      });
    }

    renderApp();
  </script>
</body>
</html>
